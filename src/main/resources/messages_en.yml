# ============================================================
# VaultCrates Messages (English)
# Color codes: & + 0-9/a-f/k-o/r
# Placeholders: {player}, {crate}, {pouch}, {amount}, {key}, {balance}, {time}
# ============================================================

prefix: "&8[&6VC&8] &r"

# General errors
no-permission: "&cYou don't have permission to execute this command."
