crate-given: "&aYou gave &e{amount}x &6{crate} Crate &ato &e{player}&a."
crate-given-silent: "&aYou silently gave &e{amount}x &6{crate} Crate &ato &e{player}&a."
crate-received: "&aYou received &e{amount}x &6{crate} Crate&a."
