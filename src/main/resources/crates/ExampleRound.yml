# ============================================================
# VaultCrates — ExampleRound.yml
# Animation: Round (slot-machine style)
# ============================================================
#
# ── Supported text formats (Name, Lores, HologramLines, …) ──
#
#  Legacy colour codes   &a &l &6 etc.
#  Hex colour            &#RRGGBB          e.g.  &#FF8800
#  MiniMessage gradient  <gradient:#f00:#00f>Text</gradient>
#  MiniMessage rainbow   <rainbow>Text</rainbow>
#  IA font icons         :icon_name:       e.g.  :ui_heart:
#
#  You may mix & codes and :icons: freely.
#  Use MiniMessage tags only if you want gradients/rainbow —
#  do NOT mix MiniMessage tags with & codes in the same line.
# ============================================================

Animation: Round
Material: ENDER_CHEST
OnlyPlaceable: true
Enchanted: false
Name: '&a&lExample &2&lRound &a&lCrate'

# How many rewards are picked and given per open (default: 1)
Size: 1

ShiftInstantlyOpen: false
ShiftInstantlyOpenAll: false

# Show a reward-preview GUI when the player left-clicks the crate
PreviewEnabled: true
ShowChanceInPreview: true
PreviewSize: 54
PreviewTitle: "&e&lPrize Preview"

# Animation visibility: ALL | Proximity
AnimationVisibilityOption: "Proximity"
Proximity_Distance: 8

# Hologram lines shown above the crate block
HologramLines:
  - "&a&lExample Round Crate"
  - "&7Right-click to open"
  - "&7Left-click to preview"

# Lore on the placeable crate item
Lores:
  - "&7An example crate"
  - ""
  - "&aNormal Rewards"
  - "&a* &f$5,000  &a* &fDiamonds  &a* &fTokens"
  - ""
  - "&6Final Rewards"
  - "&6* &fMVP Rank  &6* &fBeacon Generator"

# Commands run on the console when this crate block is placed
CommandsOnPlace: []

# Broadcast to all players when the crate is opened.
# Leave empty [] for no message.
# Placeholders: {player_name}  {ColoredReward:1}  {ColoredReward:best}
FinalMessage: []

# ── Key ────────────────────────────────────────────────────
KeyCrate:
  Require: true
  KeysRequired: 1
  MatchNBT: true        # Recommended — tamper-proof NBT matching
  MatchName: false
  MatchLore: false
  MatchEnchants: false
  Material: TRIPWIRE_HOOK
  Name: "&a&lRound Crate Key"
  Enchanted: true
  Lores:
    - ""
    - "&7Opens a Round Crate"

  # ── Shop (/vc shop) ──────────────────────────────────────
  # Set ShopEnabled: true to list this key in the shop.
  # Requires Vault + an economy plugin (e.g. EssentialsX).
  # Global toggle: config.yml → Shop.Enabled
  ShopEnabled: false
  ShopPrice: 500.0

# ── Normal Rewards ─────────────────────────────────────────
# Chance is a relative weight — does NOT need to sum to 100.
# Rarity IDs: common | rare | epic | legendary | jackpot | mega_jackpot
#
# PreviewName / PreviewLores  — optional, shown in the preview GUI.
#   Leave PreviewLores empty ([]) to show no extra lore in the preview.
#   Both fields support all text formats listed at the top of this file.
Prizes:

  Money5000:
    Material: EMERALD
    Glow: true
    Name: '&a&l$5,000'
    Rarity: rare
    Type: "Money"           # Shown in RewardFooter as {reward_type}
    Lores: []
    Enchantments: []
    GiveItem: false
    Commands:
      - eco give {player_name} 5000
    Chance: 25.0
    PreviewName: "&a&l$5,000"
    PreviewLores: []

  Diamonds:
    Material: DIAMOND
    Amount: 16
    Glow: false
    Name: '&b&l16x Diamonds'
    Rarity: common
    Type: "Item"
    Lores: []
    Enchantments: []
    GiveItem: true
    Commands: []
    Chance: 25.0
    PreviewName: "&b&l16x Diamonds"
    PreviewLores: []

  Money10000:
    Material: EMERALD
    Glow: true
    Name: '&a&l$10,000'
    Rarity: epic
    Type: "Money"
    Lores: []
    Enchantments: []
    GiveItem: false
    Commands:
      - eco give {player_name} 10000
    Chance: 15.0
    PreviewName: "&a&l$10,000"
    PreviewLores: []

  RandomMoney:
    Material: GOLD_INGOT
    Glow: true
    Name: '&6&l$1,000 - $50,000'
    Rarity: legendary
    Type: "Money"
    Lores: []
    Enchantments: []
    GiveItem: false
    RandomNumberMin: 1000
    RandomNumberMax: 50000
    RandomNumberDecimals: false
    Commands:
      - eco give {player_name} {random_number}
    Chance: 10.0
    PreviewName: "&6&l$1,000 - $50,000"
    PreviewLores: []

  Tokens32:
    Material: MAGMA_CREAM
    Glow: true
    Name: '&b&l32x Tokens'
    Rarity: rare
    Type: "Tokens"
    Lores: []
    Enchantments: []
    GiveItem: false
    Commands:
      - tokens give {player_name} 32
    Chance: 10.0
    PreviewName: "&b&l32x Tokens"
    PreviewLores: []

  SellWand:
    Material: GOLDEN_HOE
    Glow: true
    Name: '&d&l1x Sell Wand'
    Rarity: epic
    Type: "Item"
    Lores: []
    Enchantments: []
    GiveItem: false
    Commands:
      - sellwand give {player_name} 1
    Chance: 10.0
    PreviewName: "&d&l1x Sell Wand"
    PreviewLores: []

  LegendaryKey:
    Material: TRIPWIRE_HOOK
    Glow: true
    Name: '&e&l1x Legendary Key'
    Rarity: jackpot
    Type: "Key"
    Lores: []
    Enchantments: []
    GiveItem: false
    Commands:
      - vc key give {player_name} Legendary 1
    Chance: 5.0
    PreviewName: "&e&l1x Legendary Key"
    PreviewLores: []

# ── Best Prizes (guaranteed bonus reward pool) ─────────────
# One reward from this pool is ALWAYS given in addition to the
# normal prize. Useful for ranks, rare items, etc.
BestPrizes:

  MVPRank:
    Material: NETHER_STAR
    Glow: true
    Name: '&6&l1x MVP Rank'
    Rarity: mega_jackpot
    Type: "Rank"
    Lores: []
    Enchantments: []
    GiveItem: false
    Commands:
      - voucher give {player_name} mvp 1
    Chance: 30.0
    MessagesToPlayer: []
    BroadcastMessages: []
    # Prevents players who already have this rank from winning it again
    BlacklistedPerms:
      - "rank.mvp"
    PreviewName: "&6&l1x MVP Rank"
    PreviewLores: []

  BeaconGen:
    Material: BEACON
    Glow: true
    Name: '&c&l1x Beacon Generator'
    Rarity: jackpot
    Type: "Generator"
    Lores: []
    Enchantments: []
    GiveItem: false
    Commands:
      - generator give {player_name} beacon 1
    Chance: 35.0
    PreviewName: "&c&l1x Beacon Generator"
    PreviewLores: []

