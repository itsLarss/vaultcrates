# ============================================================
# Config version — do NOT edit this value manually.
# VaultCrates uses it to detect outdated configs and add
# missing keys automatically without overwriting your settings.
# ============================================================
_version: 1

# ============================================================
# Language
#
# Built-in:
#   en  = English (default)
#   de  = German  / Deutsch
#   fr  = French  / Français
#   es  = Spanish / Español
#
# Locale codes are supported (e.g. en_us, pt_br, zh_cn).
# Fallback chain: messages_en_us.yml → messages_en.yml → messages.yml
#
# Custom language: drop a messages_<code>.yml into the plugin folder.
# ============================================================
Language: en

# ============================================================
# Storage
# Type: JSON (file-based, default), SQLITE (local DB), MYSQL (network DB)
# ============================================================
Storage:
  Type: JSON
  KeyUuidExpiryDays: 365   # 0 = never expire
  SQLite:
    File: data/vaultcrates.db
  MySQL:
    Host: localhost
    Port: 3306
    Database: vaultcrates
    Username: root
    Password: ""
    UseSSL: false

# ============================================================
# VaultCrates Configuration
# Plugin by itslarss
# Version: 1.0.0
# ============================================================

Settings:
  # Enable debug messages in console
  Debug: false

  # Check Modrinth for updates on startup and every 6 hours.
  # Admins and OPs receive a chat notification on join when an update is available.
  Update_Checker: true

  # Distance (in blocks) from which crate animations are visible to players
  Animation_View_Distance: 65

  # Maximum number of players that can watch a single animation simultaneously
  Max_Players_Per_Animation: 15

  # If true, the lightning strike during animations will be silent
  Lightning_Silent: false

  # If true, checks if the player's inventory is full before giving rewards
  Max_Inventory_Check: false

  # If true, alternate accounts are included in /vc giveall
  Alts_Get_Giveall: false

  # Maximum number of crate openings that can happen simultaneously on the server
  Max_Concurrent_Opens: 50

  # Radius (in blocks) around a crate that triggers proximity effects
  Crate_Radius: 10

  # Radius (in blocks) around a pouch that triggers effects
  Pouch_Radius: 2

  # If true, /vc give and related commands are case-sensitive for crate names
  Give_Command_Case_Sensitive: true

  # If true, players in Adventure mode can open crates
  Adventure_Mode: false

  # If true, players in Creative mode cannot open crates
  Cant_Open_Creative: false

  # If true, all reward drops are logged to data/rewards.log
  Reward_Logging: false

  # If true, players must hold the key in their main hand to open a crate
  Must_Hold_Key_In_Hand: false

  # If true, players cannot drop crate keys
  Cant_Drop_Key: false

  # If true, a virtual key is given instead of a physical key if the player's inventory is full
  Give_As_Virtualkey_If_Full: false

# ============================================================
# Key Settings
# ============================================================
Keys:
  # Enable virtual (database-stored) keys
  Virtual_Keys_Enabled: true

  # Enable physical (item-based) keys
  Physical_Keys_Enabled: true

# ============================================================
# Animation Settings
# ============================================================
Animations:

  # --- Display Animation ---
  Display:
    # Number of items shown during the display animation
    Length: 14
    # How often (in ticks) the displayed item changes
    Item_Change_Interval: 3
    # Show water particle drops
    Water_Drops: true
    # Show lava particle drops
    Lava_Drops: false
    # Show villager happy particles
    Villager_Particles: true

  # --- Round Animation ---
  Round:
    # Height of the item ring above the crate
    Height: 3
    # Duration of the animation (in seconds)
    Length: 8
    # Strike lightning at the end of the animation
    Lightning: true
    # Speed multiplier for the spin
    Speed: 3.0
    # Particle effect when items change during spinning
    Item_Change_Particle: "CRIT_MAGIC"
    # If true, the guaranteed reward is always shown in the spinning ring
    Guaranteed_Shown: false

  # --- Round2 Animation ---
  Round2:
    # Duration of the animation (in seconds)
    Length: 12
    # Strike lightning at the end
    Lightning: true
    # Speed multiplier for the spin
    Speed: 3.0

  # --- Contraband Animation ---
  Contraband:
    # Speed at which item entities float upward
    Float_Speed: 1.5
    # Time (in seconds) items float before winning
    Float_Time: 2
    # Interval (in seconds) between item spawns
    Spawn_Interval: 0.65
    # Interval (in seconds) between item disappearances
    Disappear_Interval: 0.65
    # Time (in seconds) the winning item floats at the end
    Final_Float_Time: 1.3
    # Time (in seconds) the won item is displayed to the player
    Won_Display_Time: 10
    # Height above the crate that items float to
    Height: 2

  # --- Pouch Animation ---
  Pouch:
    # Show a spiral particle effect when a pouch is opened
    Spiral_Effect: true
    # Ending effect: LIGHTNING, FIREWORK, or NONE
    Ending: "LIGHTNING"

# ============================================================
# Blocked Commands
# Players cannot use these commands while an animation is running
# ============================================================
Blocked_Commands: []
#  - "/home"
#  - "/spawn"
#  - "/warp"

# ============================================================
# Win Message
# Sent privately to the player who opened the crate (no one else sees it).
# Leave empty ("") to disable.
# Variables: {reward_name}  {rarity}  {crate_name}  {player_name}
# ============================================================
Win_Message: "&8[&6VaultCrates&8] &7You won {reward_name} &8[{rarity}&8] &7from &e{crate_name}&7!"

# ============================================================
# Rarities
# Six tiers are built-in. You can override them or add custom ones.
# The rarity is cosmetic — actual drop probability is set per-reward via Chance:.
#
# Fields per rarity:
#   Name:      Display name (supports & color codes)
#   GlowColor: "R,G,B" — glow outline colour on item display entities during animations
#   Chance:    Display-only percentage shown in the win message via {chance}
#
# Built-in IDs (use these in reward Rarity: fields):
#   common       →  &7Common               (gray glow)
#   rare         →  &aRare                 (green glow)
#   epic         →  &5Epic                 (purple glow)
#   legendary    →  &6&lLegendary          (gold glow)
#   jackpot      →  &c&lJackpot            (red glow)
#   mega_jackpot →  &4&l✦ Mega Jackpot ✦  (dark red glow)
#
# Example — override a built-in or add a custom rarity:
#   jackpot:
#     Name: "&c&l★ JACKPOT ★"
#     GlowColor: "255,85,85"
#     Chance: 2.5
#   divine:
#     Name: "&d&l⚡ Divine ⚡"
#     GlowColor: "170,0,255"
#     Chance: 0.5
# ============================================================
Rarities: {}

# ============================================================
# Economy Shop
# Requires Vault + an economy plugin (e.g. EssentialsX)
# Enable in individual crates via KeyCrate.ShopEnabled: true
# ============================================================
Shop:
  # Enable the /vc shop command globally
  Enabled: true
  # Title of the shop GUI
  Title: "&6&lKey Shop"
  # Enable purchase confirmation screen
  Confirm_Purchase: true
  # true = players receive virtual keys on purchase, false = physical keys (items)
  VirtualKeys: true

# ============================================================
# NPC Support
# Link NPCs to crates via /vc linknpc <crate>
# Supports: Citizens, ZNPCs, ZNPCsPlus, FancyNpcs
# Mappings are stored in data/npcs.yml
# ============================================================
NPC:
  Enabled: true

# ============================================================
# Reward Footer
# Appends extra lore lines to every reward item showing its
# type and rarity. Disabled by default.
#
# Placeholders:
#   {reward_type}  — the reward's Type: value (set per reward in the crate config)
#                    falls back to Fallback: if not set on the reward
#   {rarity_color} — the leading color codes of the rarity name (e.g. "&6&l")
#   {rarity_name}  — the rarity display name without color codes (e.g. "Legendär")
#
# Example result:
#   &8Gewinntyp » &7Geld
#   &8Seltenheit » &6&lLegendär
# ============================================================
RewardFooter:
  Enabled: false
  Fallback: "Reward"   # shown when no Type: is set on the reward
  Lines:
    - ""
    - "&8Reward Type &raquo; &7{reward_type}"
    - "&8Rarity &raquo; {rarity_color}{rarity_name}"
